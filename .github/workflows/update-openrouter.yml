name: Update OpenRouter Data

on:
  schedule:
    # Every day at 08:00 UTC (daily panel extension)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (only 5 models, fast)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (fetch but do not commit)'
        required: false
        type: boolean
        default: false
      backfill:
        description: 'Backfill all missing dates from RSC history (~90 days)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ~5 min scrape + 1 min generate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── Step 1: extend panel_final.csv.gz with today's data ─────────────────
      - name: Extend panel (fetch daily token stats)
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            ARGS="$ARGS --backfill"
          fi
          python scripts/extend_panel.py $ARGS

      # ── Step 2: regenerate openrouter_data.js from updated panel ────────────
      - name: Regenerate visualization data
        if: github.event.inputs.dry_run != 'true'
        run: python scripts/generate_viz.py

      # ── Step 3: also refresh price_vs_intelligence from live API ────────────
      - name: Refresh live model prices
        if: github.event.inputs.dry_run != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/update_openrouter.py

      # ── Step 4: commit if anything changed ──────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- assets/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- assets/
          fi

      - name: Commit and push
        if: |
          steps.changes.outputs.changed == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/panel_final.csv.gz assets/js/openrouter_data.js
          git commit -m "auto: extend OpenRouter panel + refresh viz [$(date -u +'%Y-%m-%d')]"
          git push
